---
# E2E group_vars — docker-SUT (ansible/inventory/e2e/hosts.yml).
ansible_user: root

# SUT: подробные structlog/journald при отладке e2e (см. threlium.yaml + env/threlium.env).
threlium_log_level: "DEBUG"

# E2E: воркеры НЕ перезапускаются при падении. На «отравленном» сообщении (детерминированная
# ошибка стадии — напр. 404 от WireMock из-за пробела в стабах) прод-политика Restart=on-failure
# уводит work@ в бесконечный крэш-луп: воркер не идёт в idle, последующие тесты падают каскадом,
# время прогона раздувается. С "no" воркер падает один раз — тест сразу видит проблему, стек не
# отравляется, прогон быстрее. Затрагивает только путь ОШИБКИ (успех идёт через OnSuccess→sweep,
# не через Restart). Движок/мосты оставляем на дефолтной политике (их крэш-луп — не наша проблема,
# а cold-reset переподнимает движок). См. defaults: threlium_systemd_*_restart.
threlium_systemd_worker_restart: "no"

# E2E: БЫСТРЫЙ КОНСТАНТНЫЙ restart-backoff для engine/bridge@ (стратегию Restart= НЕ убираем — она
# принята в проекте и работает в проде; правим только cadence ТЕСТ-контура). Прод-дефолт эскалирует
# RestartSec 1s → RestartMaxDelaySec 5min за RestartSteps=10 и НЕ сбрасывает счётчик
# (StartLimitIntervalSec=0). cold-reset рестартует greenmail на КАЖДОЙ сессии → email-мост ловит
# SSLEOFError на IDLE-сокете → падает → systemd-рестарт; за ~10 cold-reset'ов backoff упирается в
# 5min → мост лежит минутами → инжектнутое письмо не забирается → mailflow flake («inbox message
# gone»). Ставим max == min (без эскалации) и маленьким → рестарт всегда ~1s, мост переподнимается
# в пределах окна теста. Прод не трогаем (дефолты в роли). См. [[fsm-worker-crashloop-poison]].
threlium_systemd_restart_sec: 1s
threlium_systemd_restart_steps: 1
threlium_systemd_restart_max_delay_sec: 1s

threlium_bundle_enabled: false
threlium_ssh_hardening_enabled: false
threlium_agent_login_password: "threlium"

# Веб-архив
threlium_mail_archive_web_enabled: true
threlium_mail_archive_cockpit_origins_extra:
  - "https://127.0.0.1:9090"
  - "https://localhost:9090"
  - "http://127.0.0.1:8080"
  - "http://localhost:8080"

# Каналы: все мосты для e2e (+ isomorph HTTP-сервер)
# Cline CLI (реальный клиент isomorph) ставится в e2e-harness bake-скриптом
# (tests/e2e/scripts/bake_e2e_sut_image.sh), НЕ в site.yml (не часть прод-деплоя).
threlium_channels:
  - email
  - matrix
  - telegram
  - isomorph

# Bridges: GreenMail + WireMock стабы
threlium_bridges:
  email:
    imap_host: greenmail
    imap_user: "test"
    imap_pass: "secret"
    imap_port: 3993
    imap_use_ssl: true
    imap_ssl_verify: false
    imap_idle_max_sec: 1740
    # GreenMail поддерживает CREATE и UID MOVE — переносим обработанные письма из INBOX.
    imap_processed_folder: "Threlium.Processed"
    imap_ensure_processed_folder: true
  matrix:
    homeserver: "http://wiremock:8080"
    user: "@e2e-bot:localhost"
    token: "e2e-matrix-test-token"
  telegram:
    bot_token: "e2e-test-telegram-token"
    bot_api_base: "http://wiremock:8080/bot"
  isomorph:
    listen_host: "127.0.0.1"
    listen_port: 8040
    api_key: "e2e-isomorph-api-key"
    push_secret: "e2e-isomorph-push-secret"
    request_timeout_sec: 180
    keepalive_sec: 20
    graceful_shutdown_sec: 10
    enabled_surfaces:
      - anthropic_messages
      - openai_chat_completions

# msmtp: GreenMail без TLS
threlium_msmtp:
  host: greenmail
  port: 3025
  user: ""
  password: ""
  from_addr: "threlium@localhost"
  tls: false
  auth: false

# litellm: WireMock HTTP-стабы
threlium_litellm:
  max_retries: 0
  llm_endpoints:
    - score: 0.0
      enabled: true
      model: "threlium_e2e_l0"
      api_base: "http://wiremock:8080"
      api_key: "e2e-test-key"
      timeout: 30
      max_tokens: 512
      chat_template_kwargs:
        enable_thinking: false
    - score: 1.0
      enabled: true
      model: "threlium_e2e_l0"
      api_base: "http://wiremock:8080"
      api_key: "e2e-test-key"
      timeout: 90
      chat_template_kwargs:
        enable_thinking: false
    - score: 2.0
      enabled: true
      model: "threlium_e2e_l0"
      api_base: "http://wiremock:8080"
      api_key: "e2e-test-key"
      timeout: 90
  embedding_endpoints:
    - embedding_score: 0.0
      enabled: true
      model: "threlium_e2e_embed"
      api_base: "http://wiremock:8080"
      api_key: "e2e-test-key"
      timeout: 90
  rerank_endpoints:
    - rerank_score: 0.0
      enabled: true
      model: "bge-rerank-e2e"
      api_base: "http://wiremock:8080/v1"
      api_key: "sk-e2e"
      timeout: 30
      top_n: 5
  targets:
    cli_hitl_resume:
      target_score: 0.0
    reasoning:
      target_score: 2.0
    enrich_plan:
      target_score: 1.0
    enrich_task_hypotheses:
      target_score: 1.0
    summarize_context:
      target_score: 1.0
    ingress_distill:
      target_score: 1.0
    response_observe:
      target_score: 1.0
    lightrag_llm:
      target_score: 1.0
    lightrag_embedding:
      target_embedding_score: 0.0
    lightrag_rerank:
      target_rerank_score: 0.0

# e2e-only: корреляция маршрутов LiteLLM
threlium_e2e:
  litellm_route_correlation: true

# enrich: token budget + summarize overflow (e2e summarize сценарии).
# model_context_tokens намеренно мал, чтобы dense-тред (2 prior turns) переполнял
# effective_budget(reasoning) ≈ 1400 − 200 − 100 = 1100 токенов; одиночный ход — нет.
threlium_enrich:
  model_context_tokens: 1400
  context_safety_margin_tokens: 100
  lightrag_query_overhead_tokens: 100
  enrich_task_hypotheses_overhead_tokens: 100
  reasoning_overhead_tokens: 200
  summarize_overhead_tokens: 100

# knowledge: observation_max_chars (prompt hint only; code does not slice)
threlium_knowledge:
  observation_max_chars: 8000

# cli: HITL для privileged на e2e (явно, не только default роли)
threlium_cli:
  privileged_hitl_enabled: true

# lightrag: только overrides для e2e (query_api без llm). insert_batch=16 (как prod): drain батчит
# индексацию (≈12× throughput, backlog не растёт неограниченно под -nN). batch=1 был leftover эпохи
# per-header-thread-root корреляции (один ainsert = один док = один thread-root); после миграции на
# body-corr (Message-ID в теле чанка, commit 0147534) корреляция per-doc, батч безопасен. Хранилища
# MVCC (LanceDB+Cozo) конкурентный батч-upsert держат.
threlium_lightrag:
  insert_batch: 16
  query_api: "aquery"
  query_mode: "mix"
