# Инвентарь для группы threlium_hosts (см. ansible/README.md).
#
# Обычный случай — целевой хост по SSH:
#   threlium_hosts:
#     hosts:
#       threlium1:
#         ansible_host: 192.0.2.10
#         ansible_user: deploy
#
# Локальный прогон (Ansible и цель на одной машине) — только для отладки:
all:
  children:
    threlium_hosts:
      hosts:
        localhost:
          ansible_connection: local
