---
threlium_user: "threlium"
# threlium_repo_path, threlium_home, threlium_systemd_user_dir, threlium_posix_home —
# derived в site.yml через getent после создания пользователя.
# threlium_repo_path можно переопределить в inventory (единственный путь с override).
threlium_bundle_enabled: true

# Уровень логирования: DEBUG, INFO, WARNING, ERROR
threlium_log_level: "INFO"

# Каналы: какие systemd bridge unit'ы создаются. bridge_*_enabled выводится автоматически.
threlium_channels:
  - email

# =============================================================================
# litellm — partial override: задайте только нужные поля, остальное из _base.
# Полные defaults: vars/main.yml → _threlium_litellm_base.
# Справочник vLLM: см. docs/PLAYBOOK.md.
# =============================================================================
threlium_litellm: {}

# =============================================================================
# lightrag — partial override: задайте только нужные поля.
# Полные defaults: vars/main.yml → _threlium_lightrag_base.
# =============================================================================
threlium_lightrag: {}

# =============================================================================
# enrich — partial override.
# =============================================================================
threlium_enrich: {}

# =============================================================================
# knowledge — лимиты observation-note для knowledge-стадий.
# =============================================================================
threlium_knowledge: {}

# =============================================================================
# bridges — определяйте только каналы из threlium_channels.
# Структура 1:1 с секцией bridges в config/threlium.yaml.
# =============================================================================
threlium_bridges:
  email:
    imap_host: ""
    imap_user: ""
    imap_pass: "{{ vault_fetchmail_password | default('') }}"
    imap_port: 0
    imap_use_ssl: true
    imap_ssl_verify: true
    imap_idle_max_sec: 1740
    # Папка/label для переноса обработанных писем из INBOX (UID MOVE). Пусто — только \Seen.
    # Gmail: label «Threlium/Processed» в UI; CREATE по IMAP не поддержан → imap_ensure_processed_folder: false.
    imap_processed_folder: "Threlium/Processed"
    imap_ensure_processed_folder: false
  # isomorph — входящий HTTP-мост (Anthropic/OpenAI API поверх FSM). api_key пуст → мост не стартует.
  isomorph:
    listen_host: "127.0.0.1"
    listen_port: 8040
    api_key: ""
    push_secret: "{{ vault_isomorph_push_secret | default('') }}"
    request_timeout_sec: 180
    keepalive_sec: 20
    graceful_shutdown_sec: 10
    enabled_surfaces:
      - anthropic_messages
      - openai_chat_completions

# =============================================================================
# cli — песочница systemd-run для cli_exec (sandbox / privileged).
# Структура 1:1 с секцией cli в config/threlium.yaml.
# =============================================================================
threlium_cli:
  exec_timeout: 30
  exec_memory_max: "256M"
  exec_cpu_quota: "100%"
  exec_tasks_max: 16
  privileged_hitl_enabled: true
  sandbox_private_network: true
  sandbox_read_write_paths: "/tmp"

# =============================================================================
# hop — бюджеты FSM.
# Структура 1:1 с секцией hop в config/threlium.yaml.
# =============================================================================
threlium_hop:
  budget_root: 256
  budget_sub: 256

# =============================================================================
# egress — исходящая почта агента.
# Структура 1:1 с секцией egress в config/threlium.yaml.
# =============================================================================
threlium_egress:
  email_from: "agent@localhost"

# =============================================================================
# msmtp — SMTP relay. tls/auth всегда on (для e2e без TLS задайте tls: false).
# =============================================================================
threlium_msmtp:
  host: "{{ vault_smtp_host | default('') }}"
  port: 587
  user: "{{ vault_smtp_user | default('') }}"
  password: "{{ vault_smtp_password | default(vault_msmtp_password | default('')) }}"
  from_addr: "{{ vault_smtp_from | default('threlium@localhost') }}"

# Веб-архив почты: Caddy + Cockpit + Roundcube + Dovecot.
threlium_mail_archive_web_enabled: true
threlium_mail_archive_caddy_bind_port: 8080
# Путь, под которым isomorph-bridge публикуется за Caddy (cockpit занимает корень /).
threlium_mail_archive_isomorph_path: "/isomorph"
threlium_mail_archive_web_root: "{{ threlium_home }}/www/cockpit-mail-plugin"
threlium_mail_archive_cockpit_origins_extra: []

# systemd user services — backoff рестартов (engine, work@, bridge@); StartLimit не задаём (0 = без потолка)
threlium_systemd_restart_sec: 1s
threlium_systemd_restart_steps: 10
threlium_systemd_restart_max_delay_sec: 5min

# Политика Restart= по сервису (настраиваемая). Прод: воркеры/мосты перезапускаются при падении,
# движок — всегда. E2E переопределяет воркер (см. group_vars/e2e.yml). См. [[fsm-worker-crashloop-poison]].
threlium_systemd_worker_restart: on-failure
threlium_systemd_bridge_restart: on-failure
threlium_systemd_engine_restart: always

# Гибкая стратегия рестарта воркера: start-rate-limit «N рестартов, потом сразу failed».
# Прод: interval=0 → systemd ОТКЛЮЧАЕТ rate-limiting (StartLimitBurst игнорируется) →
# неограниченные рестарты, эскалация RestartSec лишь СНИЖАЕТ их частоту (storm на permanent-poison
# = принятое прод-поведение). `threlium-dispatch.sh` НЕ делает `reset-failed` → в проде
# backoff-эскалация переживает повторные dispatch'и (частота падает).
# E2E: interval>0 (длинное, не-несущее) + burst=2 → ровно 1 рестарт. Детерминированный сброс
# счётчика — per-session cold-reset (`reset-failed` всех work@/sweep@ при остановке pipeline), а НЕ
# истечение окна. reasoning-хопы старты НЕ множат: handler крутит LLM-цикл ВНУТРИ одного `work@`
# (states/reasoning.py `_decide` while-loop) → старт на ОДНО входящее reasoning-письмо, не на хоп.
# См. group_vars/e2e.yml.
threlium_systemd_worker_start_limit_interval_sec: 0
threlium_systemd_worker_start_limit_burst: 5

# systemd user units (списки для loop в site.yml / refresh.yml).
threlium_engine_units: ['threlium-engine.service']
threlium_work_slice: ['threlium-work.slice']
threlium_path_unit_names: []

# Пароль для интерактивного входа под threlium_user (PAM): Cockpit, SSH с паролем и т.п.
# Пусто — учётная запись без пароля (только ключи/сессии без пароля). Задаётся в inventory (напр. e2e).
threlium_agent_login_password: ""

# Polkit: passwordless system systemd-run / daemon-reload for threlium_user (opt-in).
threlium_polkit_agent_systemd_enabled: false

# SSH hardening: authorized_keys + drop-in sshd_config.d + lineinfile.
# Ключ определяется автоматически (find на ~/.ssh/*.pub с приоритетом ed25519 > ecdsa > rsa).
# Для ручного override задайте threlium_ssh_pubkey_file или env SSH_PUBKEY_FILE.
threlium_ssh_hardening_enabled: true
threlium_ssh_pubkey_file: ""

