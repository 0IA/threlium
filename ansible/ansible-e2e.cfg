# Конфиг для e2e: collections_path = ./collections. wipe_sync — --tags refresh. bake — полный site.yml без skip-tags.
# На прод используйте дефолтный ansible.cfg.
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
# Локальная установка из collections/requirements.yml (см. tests/e2e/helpers.run_e2e_site_playbook).
collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections
host_key_checking = True
retry_files_enabled = False
stdout_callback = default
callback_result_format = yaml
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=/tmp/ansible-ssh-%%C

[inventory]
enable_plugins = ini, yaml
